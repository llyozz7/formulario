<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario</title>
</head>
<body>
    <form>
        <label for="input_nome">
        nome  
    </label>
        <input name="input_nome" type="text" placeholder="Digite seu nome">    
    </form><br>

    <form>
        <label for="input_email">
        email
    </label>
        <input name="input_email" type="email" placeholder="Digite seu email">
    </form><br>

    <form>
        <label for="input_senha">
        senha
    </label>
        <input name="input_senha" type="password" placeholder="Digite sua senha">
    </form><br>
    <button>
        enviar
    </button>
</body>
</html>
